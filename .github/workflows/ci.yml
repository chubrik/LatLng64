name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

env:
  ContinuousIntegrationBuild: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            framework: ''
          - os: ubuntu-latest
            framework: '-f net8.0'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - run: dotnet test -c Release ${{ matrix.framework }} --logger "console;verbosity=normal"

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Verify tag matches csproj version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          $xml = [xml](Get-Content LatLng64/LatLng64.csproj)
          $version = $xml.SelectSingleNode('/Project/PropertyGroup/Version').InnerText
          if ($version -ne $tag) {
            Write-Error "Tag v$tag does not match csproj <Version>$version</Version>"
            exit 1
          }

      - run: dotnet pack -c Release -o ./artifacts

      - name: Push to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          Get-ChildItem ./artifacts/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
